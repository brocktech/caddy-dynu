name: Generate new caddy version.
on:
  push:
    tags:
      # Matches v1.0.0, v2.5.11, etc.
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  new-caddy-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository.
        uses: actions/checkout@v6

      - name: Display Version
        run: |
          # GITHUB_REF_NAME will be the tag name (i.e. v1.0.0)
          echo "Running new build for Caddy ${{ github.ref_name }}"

      - name: Install required packages.
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Get clean version tag.
        run: |
          # Get raw value.
          RAW_TAG=${{ github.ref_name }}

          # Remove leading v
          STRIPPED_TAG=${RAW_TAG#v}

          # Add to env for later steps.
          echo "CLEAN_TAG=${STRIPPED_TAG}" >> ${GITHUB_ENV}

      - name: Check caddy version to determine dynu verison.
        id: semver
        uses: mage-os/github-actions/semver-compare@main
        with:
          version: ${{ env.CLEAN_TAG }}
          compare_against: '2.10.0'

      - name: Create BIN directory.
        run: |
          # Create bin directory for releases.
          echo "Creating bin directory."
          mkdir bin

      - name: Build custom Caddy binary with dynu-dns module. Caddy >= v2.10.0
        uses: azolfagharj/action-caddy-builder@v1.0.0
        if: steps.semver.outputs.result != -1
        id: caddy-ge-2-10
        with:
          caddy-version: "${{ github.ref_name }}"
          modules: |
            github.com/caddy-dns/dynu@v1.0.0

      - name: Build custom Caddy binary with dynu-dns module. Caddy < v2.10.0
        uses: azolfagharj/action-caddy-builder@v1.0.0
        if: steps.semver.outputs.result == -1
        id: caddy-lt-2-10
        with:
          caddy-version: "${{ github.ref_name }}"
          modules: |
            github.com/caddy-dns/dynu@v0.1.1

      - name: Copy Caddy binary to output spot. Caddy >= v2.10.0
        if: steps.semver.outputs.result != -1
        run: |
          # Copy binary to output spot.
          echo "Copying build caddy binary for ${{ github.ref_name }} to output path."
          cp -f "${{ steps.caddy-ge-2-10.outputs.caddy-path }}" bin/caddy

      - name: Copy Caddy binary to output spot. Caddy < v2.10.0
        if: steps.semver.outputs.result == -1
        run: |
          # Copy binary to output spot.
          echo "Copying build caddy binary for ${{ github.ref_name }} to output path."
          cp -f "${{ steps.caddy-lt-2-10.outputs.caddy-path }}" bin/caddy

      - name: Generate sha256sum of caddy binary.
        run: |
          sha=$(sha256sum bin/caddy | cut -d' ' -f 1 | tee bin/caddy.sha256)
          echo "Generated sha256 for caddy binary: ${sha}"

      - name: Create a github release.
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes/${{ github.ref_name }}.md
          files: |
            bin/caddy
            bin/caddy.sha256
